<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="gameContainer">
    <div id="hud">
      <div class="hud-item">SPEED: <span id="speedUI">0</span> MPH</div>
      <div class="hud-item">SCORE: <span id="scoreUI">0</span></div>
    </div>
    <div id="playfield"></div>
    <div id="ui-layer">
      <div id="startScreen" class="overlay">
        <div class="menu">
          <h1>MOTO RACER</h1>
          <p>Use W/A/S/D or Arrows to steer and accelerate.</p>
          <button id="startBtn">START ENGINE</button>
        </div>
      </div>
      <div id="gameOverScreen" class="overlay" style="display: none;">
        <div class="menu">
          <h1>CRASHED!</h1>
          <p>Final Score: <span id="finalScore">0</span></p>
          <button id="restartBtn">TRY AGAIN</button>
        </div>
      </div>
    </div>
  </div>
  <script type="importmap">
  {
    "imports": {
      "three": "https://unpkg.com/three@0.182.0/build/three.module.js",
      "three/addons/": "https://unpkg.com/three@0.182.0/examples/jsm/"
    }
  }
  </script>
  <script type="module">
    import * as THREE from 'three';
    window.THREE = THREE;
  </script>
  <script src="GameObject3D.js"></script>
  <script src="PlayerBike.js"></script>
  <script src="Traffic.js"></script>
  <script src="Game.js"></script>
  <script>
    const game = new Game();
    window.game = game;
    game.start();
  </script>
</body>
</html>
